# Liga VPV — Nginx reverse proxy
# Install: sudo cp deploy/nginx/ligavpv.conf /etc/nginx/conf.d/
# Then:    sudo certbot --nginx -d ligavpv.com -d www.ligavpv.com

upstream vpv_backend {
    server 127.0.0.1:8000;
}

upstream vpv_frontend {
    server 127.0.0.1:3000;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ligavpv.com www.ligavpv.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ligavpv.com www.ligavpv.com;

    # SSL — managed by Certbot (paths updated automatically)
    ssl_certificate /etc/letsencrypt/live/ligavpv.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ligavpv.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    # Backend API
    location /api/ {
        proxy_pass http://vpv_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for scraping endpoints
        proxy_read_timeout 300s;
    }

    # Static assets (player photos) — aggressive caching
    location /static/ {
        proxy_pass http://vpv_backend;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend (Next.js via PM2)
    location / {
        proxy_pass http://vpv_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev, not needed in prod but harmless)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
