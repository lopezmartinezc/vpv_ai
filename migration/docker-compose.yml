services:
  mysql-source:
    image: mysql:5.7
    container_name: vpv-mysql-source
    volumes:
      - ../claude_data/dump-ligavpv-202602201209.sql:/docker-entrypoint-initdb.d/dump.sql
    environment:
      MYSQL_ROOT_PASSWORD: migration
      MYSQL_DATABASE: ligavpv
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmigration"]
      interval: 5s
      timeout: 5s
      retries: 30

  postgres-target:
    image: postgres:16
    container_name: vpv-postgres-target
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: vpv
      POSTGRES_PASSWORD: vpv
      POSTGRES_DB: ligavpv
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpv -d ligavpv"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
